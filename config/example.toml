# Stonemite configuration
# Stored at %APPDATA%\Stonemite\config.toml

# Path to the EverQuest installation directory.
eq_dir = "C:\\Users\\Public\\Daybreak Game Company\\Installed Games\\EverQuest"

# Key to toggle PiP overlay visibility (F1-F12, Pause, ScrollLock, Insert, Delete, Home, End, PageUp, PageDown).
hide_hotkey = "F9"

# Screen edge for PiP strip: right, left, top, bottom
pip_edge = "right"

# Custom PiP strip size in pixels (omit for auto-size, double-click edge to reset)
# pip_strip_width = 200

# Snap grid size in pixels for free PiP placement (0 = no grid snap)
# snap_grid = 16

# PiP label height in pixels (default 48, try 32 for compact or 56 for large)
# pip_label_height = 48

# PiP label opacity as a percentage, 0–100 (default 80)
# pip_label_opacity = 80

# Automatically order PiP windows by slot number (default true)
# auto_order = true

# Hide background EQ windows from Alt-Tab (active window stays visible)
# hide_from_alt_tab = true

# Per-PiP custom positions (set via Edit Layout mode, or manually).
# Empty = auto strip layout. Each entry needs slot, x, y, width, height.
# [[pip_positions]]
# slot = 0
# x = 1600
# y = 100
# width = 320
# height = 228

# Toast notifications (shown on window swap, close, broadcast toggle)
# toast_enabled = true
# toast_height = 64
# toast_duration = 2.0

# Automatically check for updates on launch (default true, checks every 7 days)
# auto_update_check = true
# update_check_interval_days = 7

# Anonymous usage telemetry (set to false to disable)
# telemetry = true
